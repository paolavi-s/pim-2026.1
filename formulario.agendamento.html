<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f0eb;
      font-family: 'Lato', sans-serif;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .form-wrap {
      max-width: 620px;
      margin: 0 auto;
    }

    .form-header {
      border-left: 4px solid #7b3b0c;
      padding-left: 1rem;
      margin-bottom: 2rem;
    }
    .form-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: #4a1e05;
      margin-bottom: 4px;
    }
    .form-header p {
      font-size: 14px;
      color: #666;
    }

    .section-card {
      background: #fff;
      border: 1px solid #e0d5cc;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 500;
      color:  #a36326;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .field-row.full { grid-template-columns: 1fr; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field label {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field input,
    .field select,
    .field textarea {
      font-family: 'Lato', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #d0c4b8;
      background: #faf7f5;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #7b3b0c;
      box-shadow: 0 0 0 3px rgba(123, 59, 12, 0.12);
    }
    .field textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Botão */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #7b3b0c;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.5rem;
    }
    .submit-btn:hover { background: #4a1e05; }
    .submit-btn:active { transform: scale(0.98); }

    /* Mensagem de sucesso */
    .success-msg {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      background: #fff;
      border: 1px solid #e0d5cc;
      border-radius: 12px;
      margin-top: 1rem;
    }
    .success-msg h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #4a1e05;
      margin-bottom: 8px;
    }
    .success-msg p {
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 500px) {
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="form-wrap">

    <div class="form-header">
      <h1>Reserva de Horário</h1>
      <p>Agende sua visita para conhecer e brincar com os nossos gatinhos!</p>
    </div>

    <form id="main-form" onsubmit="handleSubmit(event)">

      <div class="section-card">
        <div class="section-title">Dados Pessoais</div>

        <div class="field-row">
          <div class="field">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" placeholder="Ex: Valentino da Silva" required>
          </div>
          <div class="field">
            <label for="documento">Documento (CPF ou RG)</label>
            <input type="text" id="documento" placeholder="000.000.000-00 ou 00.000.000-0" required>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
          </div>
          <div class="field">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="exemplo@email.com" required>
          </div>
        </div>
      </div>

      <div class="section-card">
        <div class="section-title">Detalhes da Visita</div>

        <div class="field-row">
          <div class="field">
            <label for="data">Data da Visita</label>
            <input type="date" id="data" required>
          </div>
          <div class="field">
            <label for="horario">Horário</label>
            <select id="horario" required>
              <option value="" disabled selected>Selecione um horário</option>
              <option value="10:00">10:00</option>
              <option value="11:30">11:30</option>
              <option value="13:00">13:00</option>
              <option value="14:30">14:30</option>
              <option value="16:00">16:00</option>
              <option value="17:30">17:30</option>
              <option value="19:00">19:00</option>
            </select>
          </div>
        </div>

        <div class="field-row full">
          <div class="field">
            <label for="pessoas">Quantidade de Pessoas</label>
            <select id="pessoas" required>
              <option value="1">1 pessoa</option>
              <option value="2">2 pessoas</option>
              <option value="3">3 pessoas</option>
              <option value="4">4 pessoas</option>
              <option value="5+">5 ou mais pessoas</option>
            </select>
          </div>
        </div>

        <div class="field-row full" style="margin-bottom: 0;">
          <div class="field">
            <label for="observacoes">Alguma duvida em relação á area de gatos?</label>
            <textarea id="observacoes" placeholder="Ex: Crianças podem entrar, quantidade de gatos no local, etc"></textarea>
          </div>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Reservar Horário
      </button>

    </form>

    <div class="success-msg" id="success">
      <h3>Reserva Solicitada!</h3>
      <p>Obrigado por agendar sua visita. Enviamos uma confirmação com os detalhes para o seu e-mail.</p>
    </div>

  </div>

  <script>
    // Configura a data mínima como "hoje" para evitar reservas no passado
    const dataInput = document.getElementById('data');
    const hoje = new Date().toISOString().split('T')[0];
    dataInput.min = hoje;

    // Máscara do Telefone (XX) XXXXX-XXXX
    const telInput = document.getElementById('telefone');
    telInput.addEventListener('input', () => {
      let v = telInput.value.replace(/\D/g, '');
      if (v.length > 11) v = v.slice(0, 11);
      if (v.length > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
      } else if (v.length > 5) {
        v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, "($1) $2-$3");
      } else if (v.length > 2) {
        v = v.replace(/^(\d{2})(\d{0,5})$/, "($1) $2");
      } else {
        v = v.replace(/^(\d*)$/, "($1");
      }
      telInput.value = v;
    });

    // Envio do formulário
    function handleSubmit(event) {
      event.preventDefault(); // Impede a página de recarregar
      document.getElementById('main-form').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    }
  </script>

</body>
</html>
